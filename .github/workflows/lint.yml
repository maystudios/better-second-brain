name: wiki-lint

on:
  push:
    branches: [main]
    paths:
      - "wiki/**"
      - "scripts/**"
  pull_request:
    paths:
      - "wiki/**"
      - "scripts/**"

jobs:
  lint:
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest
        python-version:
          - "3.10"
          - "3.12"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Find orphans (informational)
        run: python scripts/find_orphans.py --quiet

      - name: Verify wikilinks (broken links fail CI)
        run: python scripts/verify_wikilinks.py

      - name: Source-grade lint (Tier-A gate)
        run: python scripts/lint_sources.py --strict --strict-min-tier A --summary
